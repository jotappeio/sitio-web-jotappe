<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FG9R1TWNW9"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jotappe | Ingeniería de Proceso</title>
    <style>
        :root { --accent: #8fbc8f; --bg: #050505; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* CAPA DE FONDO - SIEMPRE ACTIVA (EVITA EL NEGRO) */
        .bg-carrusel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 1; opacity: 0.2; pointer-events: none; 
            background-color: #111;
            /* IMAGEN DE SEGURIDAD: DESIERTO (CARGA INSTANTÁNEA) */
            background-image: url('https://images.unsplash.com/photo-1468242396317-4d11045ca73a?q=40&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
        }
        
        .carrusel-item { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            opacity: 0; 
            filter: grayscale(100%) contrast(120%);
            animation: infiniteCrossFade 30s infinite;
        }

        /* 1. NORTE - DESIERTO (Ajustado) */
        .carrusel-item:nth-child(1) { 
            background-image: url('https://images.unsplash.com/photo-1468242396317-4d11045ca73a?q=60&w=1400&auto=format&fit=crop'); 
            animation-delay: 0s; 
        } 
        /* 2. CENTRO - SANTIAGO URBANO (Nuevo ID Rápido) */
        .carrusel-item:nth-child(2) { 
            background-image: url('https://images.unsplash.com/photo-1468306713106-9634e0050e64?q=60&w=1400&auto=format&fit=crop'); 
            animation-delay: 5s; 
        }
        /* 3. SUR - ARAUCANÍA */
        .carrusel-item:nth-child(3) { 
            background-image: url('https://images.unsplash.com/photo-1571216239102-1405106509f6?q=60&w=1400&auto=format&fit=crop'); 
            animation-delay: 10s; 
        }
        /* 4. SUR - LAGOS */
        .carrusel-item:nth-child(4) { 
            background-image: url('https://images.unsplash.com/photo-1549410143-69022e374d6c?q=60&w=1400&auto=format&fit=crop'); 
            animation-delay: 15s; 
        }
        /* 5. CORDILLERA - ANDES */
        .carrusel-item:nth-child(5) { 
            background-image: url('https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?q=60&w=1400&auto=format&fit=crop'); 
            animation-delay: 20s; 
        }
        /* 6. PATAGONIA */
        .carrusel-item:nth-child(6) { 
            background-image: url('https://images.unsplash.com/photo-1504280390367-361c6d9f38f4?q=60&w=1400&auto=format&fit=crop'); 
            animation-delay: 25s; 
        }
        
        @keyframes infiniteCrossFade {
            0% { opacity: 0; }
            5% { opacity: 1; }
            20% { opacity: 1; }
            25% { opacity: 0; }
            100% { opacity: 0; }
        }

        /* UI ELEMENTS */
        .content { position: relative; z-index: 10; text-align: center; padding: 20px; max-width: 900px; }
        .logo-box { display: inline-block; font-weight: 900; font-size: 2.5rem; color: var(--accent); border: 4px solid var(--accent); padding: 5px 20px; border-radius: 12px; margin-bottom: 40px; }
        
        h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin-bottom: 25px; text-transform: uppercase; }
        p { font-size: 1.1rem; font-weight: 300; color: #bbb; letter-spacing: 1.5px; line-height: 1.5; max-width: 650px; margin: 0 auto; }
        
        .cv-container { margin-top: 70px; margin-bottom: 70px; }
        .cv-btn { 
            display: inline-flex; align-items: center; gap: 15px; 
            color: #000; background: var(--accent); 
            text-decoration: none; font-weight: 950; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 3px; 
            padding: 22px 55px; border-radius: 50px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(143, 188, 143, 0.4);
        }
        .cv-btn:hover { transform: scale(1.08) translateY(-5px); background: #fff; }

        .social-box { margin-top: 40px; display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
        .social-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 950; 
            font-size: 1.3rem; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            transition: 0.3s; 
            opacity: 1; 
            text-shadow: 0 0 20px rgba(143, 188, 143, 0.3);
        }
        .social-link:hover { color: #fff; transform: scale(1.1); }

        .status-bar { position: fixed; bottom: 40px; width: 100%; text-align: center; font-size: 0.7rem; letter-spacing: 6px; color: #555; text-transform: uppercase; font-weight: 900; }

        @media (max-width: 600px) {
            .social-box { gap: 20px; }
            .social-link { font-size: 1rem; letter-spacing: 3px; }
        }
    </style>
</head>
<body>

    <div class="bg-carrusel">
        <div class="carrusel-item"></div>
        <div class="carrusel-item"></div>
        <div class="carrusel-item"></div>
        <div class="carrusel-item"></div>
        <div class="carrusel-item"></div>
        <div class="carrusel-item"></div>
    </div>

    <div class="content">
        <div class="logo-box">J</div>
        <h1>Rediseñando<br>el camino a la Cumbre</h1>
        <p>Estamos optimizando nuestra terminal de operaciones para alcanzar un nuevo estándar técnico.</p>
        
        <div class="cv-container">
            <a href="assets/CV_Juan_Pablo_Diaz.pdf" class="cv-btn" target="_blank">Descargar CV</a>
        </div>

        <div class="social-box">
            <a href="https://wa.me/56950005651" class="social-link">WhatsApp</a>
            <a href="https://www.linkedin.com/in/jotappecom" class="social-link">LinkedIn</a>
            <a href="https://www.instagram.com/jotappe.io/" class="social-link">Instagram</a>
        </div>
    </div>

    <div class="status-bar">
        SANTIAGO - TEMUCO // CHILE // 2026
    </div>

</body>
</html>
