<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FG9R1TWNW9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FG9R1TWNW9');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jotappe | Ingeniería de Proceso</title>
    <style>
        :root { --accent: #8fbc8f; --bg: #050505; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* FONDO DINÁMICO DE IMPACTO (MOSAICO CHILE) */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); z-index: 1; opacity: 0.15; pointer-events: none; filter: grayscale(100%) contrast(125%); }
        .tile { width: 100%; height: 100%; background-size: cover; background-position: center; animation: fadeIn 2s forwards; }

        /* CONTENIDO CENTRAL */
        .content { position: relative; z-index: 10; text-align: center; padding: 20px; max-width: 900px; }
        
        .logo-box { display: inline-block; font-weight: 900; font-size: 2.5rem; color: var(--accent); border: 4px solid var(--accent); padding: 5px 20px; border-radius: 12px; margin-bottom: 40px; }
        
        h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: 1.2rem; font-weight: 300; color: #bbb; letter-spacing: 1px; line-height: 1.5; max-width: 650px; margin: 0 auto; }
        
        /* CONTENEDOR CV CON ESPACIADO AUMENTADO */
        .cv-container { margin-top: 60px; margin-bottom: 60px; }
        .cv-btn { 
            display: inline-flex; align-items: center; gap: 15px; 
            color: #000; background: var(--accent); 
            text-decoration: none; font-weight: 900; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 2px; 
            padding: 20px 50px; border-radius: 50px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(143, 188, 143, 0.3);
        }
        .cv-btn:hover { transform: scale(1.05) translateY(-5px); background: #fff; }

        /* CONTACTO MAXIMIZADO Y RESALTADO */
        .social-box { margin-top: 70px; display: flex; justify-content: center; gap: 50px; flex-wrap: wrap; }
        .social-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 950; /* MÁXIMO RESALTE */
            font-size: 1.2rem; /* TAMAÑO AGRESIVO */
            text-transform: uppercase; 
            letter-spacing: 4px; 
            transition: 0.3s; 
            opacity: 0.95; 
            border-bottom: 2px solid transparent;
            padding-bottom: 5px;
            text-shadow: 0 0 15px rgba(143, 188, 143, 0.2); /* RESALTE VISUAL */
        }
        .social-link:hover { 
            opacity: 1; 
            color: #fff;
            border-bottom: 2px solid var(--accent);
            transform: translateY(-3px); 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* LÍNEA DE ESTADO */
        .status-bar { position: fixed; bottom: 40px; width: 100%; text-align: center; font-size: 0.7rem; letter-spacing: 6px; color: #444; text-transform: uppercase; font-weight: 900; }

        @media (max-width: 600px) {
            .social-box { gap: 20px; }
            .social-link { font-size: 1rem; letter-spacing: 2px; }
        }
    </style>
</head>
<body>

    <div class="bg-layer" id="bgGrid"></div>

    <div class="content">
        <div class="logo-box">J</div>
        <h1>Rediseñando<br>el camino a la Cumbre</h1>
        <p>Estamos optimizando nuestra terminal de operaciones para alcanzar un nuevo estándar técnico.</p>
        
        <div class="cv-container">
            <a href="assets/CV_Juan_Pablo_Diaz.pdf" class="cv-btn" target="_blank">Descargar CV</a>
        </div>

        <div class="social-box">
            <a href="https://wa.me/56950005651" class="social-link">WhatsApp</a>
            <a href="https://www.linkedin.com/in/jotappecom" class="social-link">LinkedIn</a>
            <a href="https://www.instagram.com/jotappe.io/" class="social-link">Instagram</a>
        </div>
    </div>

    <div class="status-bar">
        SANTIAGO - TEMUCO // CHILE // 2026
    </div>

    <script>
        const grid = document.getElementById('bgGrid');
        // CURADURÍA DE IMÁGENES DE CHILE (Unsplash IDs)
        const imgs = [
            'https://images.unsplash.com/photo-1504280390367-361c6d9f38f4', // Patagonia / Alta Montaña
            'https://images.unsplash.com/photo-1549410143-69022e374d6c', // Volcanes Sur / Altiplano feel
            'https://images.unsplash.com/photo-1571216239102-1405106509f6', // Bosques / Sur
            'https://images.unsplash.com/photo-1510414842594-a61c69b5ae57', // Lagos
            'https://images.unsplash.com/photo-1440557653082-e8e186733eeb', // Desierto / Atacama
            'https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5'  // Ciudad / Textura Urbana (Santiago feel)
        ];
        function initGrid() {
            if(!grid) return;
            grid.innerHTML = '';
            // Generamos un mosaico de 12 piezas con variedad territorial real
            for(let i=0; i<12; i++) {
                const t = document.createElement('div');
                t.className = 'tile';
                const imgUrl = imgs[i % imgs.length];
                t.style.backgroundImage = `url(${imgUrl}?q=60&w=1000&auto=format&fit=crop)`;
                t.style.animationDelay = `${Math.random() * 2}s`; // ANIMACIÓN DINÁMICA
                grid.appendChild(t);
            }
        }
        window.onload = initGrid;
    </script>
</body>
</html>
