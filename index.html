<!DOCTYPE html>
<html lang="es">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FG9R1TWNW9"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-FG9R1TWNW9');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jotappe | Ingeniería de Proceso</title>
    <style>
        :root { --accent: #8fbc8f; --bg: #050505; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); font-family: 'Inter', system-ui, sans-serif; color: var(--text); overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* FONDO DINÁMICO DE IMPACTO (MOSAICO) */
        .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); z-index: 1; opacity: 0.15; pointer-events: none; filter: grayscale(100%) contrast(120%); }
        .tile { width: 100%; height: 100%; background-size: cover; background-position: center; animation: fadeIn 2s forwards; }

        /* CONTENIDO CENTRAL */
        .content { position: relative; z-index: 10; text-align: center; padding: 20px; max-width: 800px; }
        
        .logo-box { display: inline-block; font-weight: 900; font-size: 2.5rem; color: var(--accent); border: 4px solid var(--accent); padding: 5px 20px; border-radius: 12px; margin-bottom: 40px; }
        
        h1 { font-size: clamp(2.5rem, 8vw, 5.5rem); font-weight: 900; letter-spacing: -4px; line-height: 0.85; margin-bottom: 20px; text-transform: uppercase; }
        p { font-size: 1.2rem; font-weight: 300; color: #ccc; margin-bottom: 10px; letter-spacing: 1px; line-height: 1.5; }
        
        /* BOTÓN CV CON MAYOR ESPACIADO */
        .cv-container { margin-top: 50px; margin-bottom: 50px; }
        .cv-btn { 
            display: inline-flex; align-items: center; gap: 15px; 
            color: #000; background: var(--accent); 
            text-decoration: none; font-weight: 900; font-size: 0.85rem; 
            text-transform: uppercase; letter-spacing: 2px; 
            padding: 20px 50px; border-radius: 50px; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(143, 188, 143, 0.3);
        }
        .cv-btn:hover { transform: scale(1.05) translateY(-5px); background: #fff; }

        /* CONTACTO RESALTADO */
        .social-box { margin-top: 80px; display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; }
        .social-link { 
            color: var(--accent); 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 1.1rem; /* TAMAÑO AUMENTADO */
            text-transform: uppercase; 
            letter-spacing: 4px; 
            transition: 0.3s; 
            opacity: 0.9; /* RESALTE INICIAL */
            border-bottom: 2px solid transparent;
            padding-bottom: 5px;
        }
        .social-link:hover { 
            opacity: 1; 
            color: #fff;
            border-bottom: 2px solid var(--accent);
            transform: translateY(-3px); 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* LINEA DE ESTADO */
        .status-bar { position: fixed; bottom: 40px; width: 100%; text-align: center; font-size: 0.65rem; letter-spacing: 5px; color: #444; text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

    <div class="bg-layer" id="bgGrid"></div>

    <div class="content">
        <div class="logo-box">J</div>
        <h1>Rediseñando<br>el camino a la Cumbre</h1>
        <p>Estamos optimizando nuestra terminal de operaciones para alcanzar un nuevo estándar técnico.</p>
        
        <div class="cv-container">
            <a href="assets/CV_Juan_Pablo_Diaz.pdf" class="cv-btn" target="_blank">Descargar CV</a>
        </div>

        <div class="social-box">
            <a href="https://wa.me/56950005651" class="social-link">WhatsApp</a>
            <a href="https://www.linkedin.com/in/jotappecom" class="social-link">LinkedIn</a>
            <a href="https://www.instagram.com/jotappe.io/" class="social-link">Instagram</a>
        </div>
    </div>

    <div class="status-bar">
        System Update // Strategy Outdoor // 2026
    </div>

    <script>
        const grid = document.getElementById('bgGrid');
        const imgs = [
            'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b',
            'https://images.unsplash.com/photo-1454496522488-7a8e488e8606',
            'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05'
        ];
        function init() {
            if(!grid) return;
            grid.innerHTML = '';
            for(let i=0; i<12; i++) {
                const t = document.createElement('div');
                t.className = 'tile';
                t.style.backgroundImage = `url(${imgs[i%3]}?q=60&w=1000&auto=format&fit=crop)`;
                t.style.animationDelay = `${Math.random() * 2}s`;
                grid.appendChild(t);
            }
        }
        window.onload = init;
    </script>
</body>
</html>
